name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      # Cache the pre-commit hook environments, keyed on the config.
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      # Run the same hooks contributors run locally (ruff lint + format + file
      # hygiene), so CI and pre-commit can never disagree. Fails if any hook would
      # change a file. The commit-msg hook isn't run here (no commit to check).
      - name: pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
      - name: ty (strict types)
        run: uv run ty check

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      # The pure-Python suite: no Julia installed, so this also proves the
      # rxinfer-marked tests deselect cleanly when the optional extra is absent.
      - name: pytest + coverage gate
        run: >-
          uv run pytest -m "not rxinfer"
          --cov=cpomdp --cov-report=term-missing --cov-fail-under=80

  oracle:
    name: rxinfer oracle (Julia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --extra rxinfer
      # juliacall provisions its own Julia + RxInfer (per juliapkg.json) on first
      # import; cache the depot so only the first run pays the full download/build.
      - name: Cache Julia depot
        uses: actions/cache@v5
        with:
          path: ~/.julia
          key: julia-depot-${{ runner.os }}-${{ hashFiles('src/cpomdp/juliapkg.json') }}
          restore-keys: julia-depot-${{ runner.os }}-
      - name: pytest (rxinfer only)
        run: uv run pytest -m rxinfer

  # Regenerate the committed coverage badge (docs/assets/coverage.svg) on main and
  # commit it back if it changed. No third-party service: the SVG lives in the repo.
  # `[skip ci]` on the commit avoids re-triggering this workflow.
  coverage-badge:
    name: coverage badge
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - name: regenerate badge
        run: |
          uv run pytest -m "not rxinfer" --cov=cpomdp --cov-report=xml -q
          uvx --from "genbadge[coverage]" genbadge coverage \
            -i coverage.xml -o docs/assets/coverage.svg
      - name: commit if changed
        run: |
          if ! git diff --quiet docs/assets/coverage.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/assets/coverage.svg
            git commit -m "ci: update coverage badge [skip ci]"
            git push
          fi
