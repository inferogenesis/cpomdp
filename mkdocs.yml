site_name: cpomdp
site_description: Continuous active inference for Python — the continuous-state sibling of pymdp.
site_url: https://inferogenesis.github.io/cpomdp/
repo_url: https://github.com/inferogenesis/cpomdp
repo_name: inferogenesis/cpomdp

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: [.]

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - Examples: examples.md
  - API reference:
      - Agent: api/agent.md
      - Model & belief: api/model.md
      - Backends: api/backends.md
      - Control: api/control.md
  - Changelog: changelog.md
